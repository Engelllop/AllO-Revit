name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build (3 versiones de Revit + Shared + Tests)
        run: dotnet build AllO.sln -c Release -warnaserror

      - name: Tests
        run: dotnet test src/Tests/AllO.Tests.csproj -c Release --no-build
